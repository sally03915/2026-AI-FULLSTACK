<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Avengers Members - Ajax Fetch (XML)</title>
  <meta charset="utf-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container my-3">
  <h3 class="card-header">Avengers Members (XML)</h3>
  <input type="text" id="searchBox" placeholder="이름 검색..." class="form-control my-2" onkeyup="filterTable()"/>
  <table class="table table-striped table-bordered" id="memberTable">
    <thead>
      <tr><th>Image</th><th>Name</th><th>Age</th><th>Address</th><th>Mobile</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- 모달 -->
<div class="modal fade" id="infoModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Member Info</h5></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
      </div>
    </div>
  </div>
</div>

<script>
// XML 불러오기
function loadXml(){
   fetch("./data/member.xml")
     .then(res=>{
       if(!res.ok) throw Error("에러상태: "+res.status);
       return res.text();
     })
     .then(xml=>{
       const parser = new DOMParser();
       const xmlDoc = parser.parseFromString(xml,"application/xml");

       const members = xmlDoc.getElementsByTagName("member");
       for(let m of members){
         const img = m.getElementsByTagName("img")[0].textContent;
         const name = m.getElementsByTagName("name")[0].textContent;
         const age = m.getElementsByTagName("age")[0].textContent;
         const address = m.getElementsByTagName("address")[0].textContent;
         const mobile = m.getElementsByTagName("mobile")[0].textContent;
         
         document.querySelector("#memberTable tbody").innerHTML 
                += `<tr onclick="memberModal(this)">
                    <td><img src="${img}" alt="${name}" class="w-75" /></td>
                    <td>${name}</td>
                    <td>${age}</td>
                    <td>${address}</td>
                    <td>${mobile}</td>
                  </tr>`;
       }
     });
}

// 행 클릭 시 모달 열기
function memberModal(tr){
  const tds = tr.querySelectorAll("td");
  const imgTag = tds[0].querySelector("img").src;
  const name   = tds[1].innerText;
  const age    = tds[2].innerText;
  const addr   = tds[3].innerText;
  const mobile = tds[4].innerText;

  showModal(name, age, addr, mobile, imgTag);
}

// 모달 팝업
function showModal(name, age, address, mobile, img){
  document.getElementById("modalBody").innerHTML =
    `<img src="${img}" width="150"><br/>
     <p>이름: ${name}</p>
     <p>나이: ${age}</p>
     <p>주소: ${address}</p>
     <p>전화: ${mobile}</p>`;
  new bootstrap.Modal(document.getElementById("infoModal")).show();
}

// 검색 필터
function filterTable(){
  let keyword = document.getElementById("searchBox").value.toLowerCase();
  document.querySelectorAll("#memberTable tbody tr").forEach(tr=>{
    tr.style.display = tr.innerText.toLowerCase().includes(keyword) ? "" : "none";
  });
}

// 페이지 로드 시 XML 불러오기
window.onload = loadXml;
</script>
</body>
</html>
