<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>float</title>
    <style> 
    * {margin:0; padding:0; }

    body{  font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        background-image:linear-gradient(135deg, #f4ffb8 , #8affd0);
    }
    h1{ border-left:10px solid #123456; 
        border-bottom:1px solid #123456;
        margin:30px 0; padding-left:20px;
    }
    .container{  width:80%; margin:50px auto;   border-radius: 10px; background-color:#fff;  padding:20px; 
        box-shadow:0 0 10px rgba(0,0,0,0.2);  overflow: hidden;} /* 3.overflow */
    .t1{float:left;}    /*1. 배치 : float:left  */
    .t2{float:right;}   /*2. 배치 : float:right  */

    ul.team { width:40%;  list-style: none;  background-color:#333; overflow: hidden;}  /*  clear : both  */
    ul.team  li { float:left; margin:10px;}  

    ul.team  li  img {   width:100px; height:100px;  border-radius: 50%; border:3px solid #ff6600;  
        transition: transform 0.8s,     border-color 0.8s;
    }

    ul.team li:first-child   img:hover{  transform:translateY(-20px); border-color:#00ccff;   }
    ul.team li:nth-child(2)  img:hover{  transform:rotateZ(20deg);    border-color:#00ff0d;   } 
    ul.team li:nth-child(3)  img:hover{  transform:rotateX(180deg);   border-color:#ff0044;   } 
    ul.team li:nth-child(4)  img:hover{  transform:rotateY(180deg);   border-color:#3700ff;   } 
    ul.team li:last-child    img:hover{  transform:rotate(360deg) scale(1.2);  border-color:#00ccff;   }
/*    
    여러 개의 얼굴 이미지를 원형으로 꾸미고,
   Q1. ul 태그의 기본 목록 스타일 제거, 안쪽/바깥 여백 없애기
   Q2. li 태그는 왼쪽으로 나란히 배치(float:left), 바깥 여백(10px)
   Q3. img 너비/높이(100px), 원형(border-radius:50%), 테두리(3px solid #ff6600),
     전환 효과(transform, border-color 각각 0.8s)
   Q4. 첫 번째 얼굴: 마우스 오버 시 위로 점프(translateY(-20px)), 테두리 색(#00ccff)
   Q5. 두 번째 얼굴: 마우스 오버 시 좌우 흔들기(rotateZ(20deg)), 테두리 색(#33cc33)
   Q6. 세 번째 얼굴: 마우스 오버 시 X축 뒤집기(rotateX(180deg)), 테두리 색(#ff33aa)
   Q7. 네 번째 얼굴: 마우스 오버 시 Y축 뒤집기(rotateY(180deg)), 테두리 색(#ffaa00)
   Q8. 마지막 얼굴: 마우스 오버 시 빙글빙글 회전(rotate(360deg) scale(1.2)), 테두리 색(#6600ff) 
   // .t1은 왼쪽에 배치,   .t2는 오른쪽 배치 - 하얀색 배경나오게
*/  
    </style>
</head>
<body>
    <div class="container">
        <h1> 어벤져스</h1>
        <ul class="team t1">
            <li><img src="./img/one.png"   alt="팀원1"/></li>
            <li><img src="./img/two.png"   alt="팀원2"/></li>
            <li><img src="./img/three.png" alt="팀원3"/></li>
            <li><img src="./img/four.png"  alt="팀원4"/></li>
            <li><img src="./img/five.png"  alt="팀원5"/></li>
        </ul>

        <ul class="team t2">
            <li><img src="https://picsum.photos/100?random=1" alt="얼굴1"></li>
            <li><img src="https://picsum.photos/100?random=2" alt="얼굴2"></li>
            <li><img src="https://picsum.photos/100?random=3" alt="얼굴3"></li>
            <li><img src="https://picsum.photos/100?random=4" alt="얼굴4"></li>
            <li><img src="https://picsum.photos/100?random=5" alt="얼굴5"></li>
        </ul>
    </div>
</body>
</html>
