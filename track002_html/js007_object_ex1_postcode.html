    <h4>STEP4. 우편번호 </h4>
    <pre>
    1. 다음우편번호 사이트   
    - 다음에서 제공하는 postcode.v2.js 스크립트를 불러옵니다.
    https://postcode.map.kakao.com/guide
    - new daum.Postcode({...}) 객체를 생성해 팝업을 띄우고, 선택한 주소와 우편번호를 입력창에 자동으로 채워 넣습니다.
    </pre>
    <script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

    <input type="text" id="postcode" placeholder="우편번호" title="우편번호">
    <input type="text" id="address" placeholder="주소" title="주소">
    <input type="text" id="address2" placeholder="주소" title="상세주소">
    <button onclick="postcode()">우편번호 찾기</button>

    <script> 
    // 이벤트대상(button)  이벤트(click)  이벤트핸들러(postcode())
    // Q) postcode() 함수 정의 내리기 - 버튼클릭 시 우편번호를 검색합니다 알림창(alert)
    // function  hi(){  alert("브라우저에 등록");  }
    window.addEventListener("load" ,  function(){
    });

    function postcode(){
      alert("우편번호를 검색합니다.");
      new kakao.Postcode({
          oncomplete: function(data) {
              console.log(data);
              // data = {zonecode: '21391', postcode1: '', postcode2: '', postcodeSeq: '', zonecode: '13529', …}
              // data는 사용자가 선택한 주소 정보를 담고 있는 객체이며, 
              // 상세 설명은 아래 목록에서 확인하실 수 있습니다.
              document.getElementById("postcode").value = data.zonecode;
              document.getElementById("address").value  = data.address;
              document.getElementById("address2").focus();   //커서가게
          }
      }).open();
    } 
    </script>
