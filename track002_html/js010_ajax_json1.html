<!DOCTYPE html>
<html lang="ko">
<head>
  <title>Avengers Members - Ajax Fetch</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
<div class="container my-3">
  <h3 class="card-header">Avengers Members</h3>
  <input type="text" id="searchBox" placeholder="이름 검색..." class="form-control my-2" onkeyup="filterTable()"/>
  <table class="table table-striped table-bordered" id="memberTable">
    <thead>
      <tr><th>Image</th><th>Name</th><th>Age</th><th>Address</th><th>Mobile</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- 모달 -->
<div class="modal fade" id="infoModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header"><h5 class="modal-title">Member Info</h5></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button></div>
    </div>
  </div>
</div>

<script>
// JSON 불러오기 (data/json1.json)
function loadJson(){
  fetch("./data/member.json")
    .then(res => res.json())
    .then(data => {
      let result="";
      data.members.forEach(m => {
        result += `<tr onclick="showModal('${m.name}','${m.age}','${m.address}','${m.mobile}','${m.img}')">
                     <td><img src="${m.img}" width="50"></td>
                     <td>${m.name}</td><td>${m.age}</td><td>${m.address}</td><td>${m.mobile}</td>
                   </tr>`;
      });
      document.querySelector("#memberTable tbody").innerHTML = result;
    });
}

// 모달 팝업
function showModal(name, age, address, mobile, img){
  document.getElementById("modalBody").innerHTML =
    `<img src="${img}" width="150"><br/>
     <p>이름: ${name}</p>
     <p>나이: ${age}</p>
     <p>주소: ${address}</p>
     <p>전화: ${mobile}</p>`;
  new bootstrap.Modal(document.getElementById("infoModal")).show();
}

// 검색 필터
function filterTable(){
  let keyword = document.getElementById("searchBox").value.toLowerCase();
  document.querySelectorAll("#memberTable tbody tr").forEach(tr=>{
    tr.style.display = tr.innerText.toLowerCase().includes(keyword) ? "" : "none";
  });
}

// 페이지 로드 시 JSON 불러오기
window.onload = loadJson;
</script>
</body>
</html>
