<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"> 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link href="./css/style.css" rel="stylesheet">
</head>
<body>
    <div class="container  my-5 card">
        <h3 class="card-header">001.  LAYOUT</h3>
        <p> 표 - 줄 - 칸 </p>
        <p> .container   : 표,전체박스, 아파트</p>
        <p> .row         : 박스안에 줄, 각 층</p>
        <p> .col-sm-12   : 칸 ,  12칸을 기준</p>
    </div>

    <div class="m-5">
        <h3>002. container (아파트)</h3>
        <div class="container        bg-warning p-3">CONTAINER</div>
        <div class="container-fluid  bg-success p-3">container-fluid</div>
    </div>    

    <div class="m-5">
        <h3>003. row (층)  </h3>
        <div class="container bg-warning">
            <div class="row bg-warning p-3">3층</div>
            <div class="row bg-info    p-3">2층</div>
            <div class="row bg-success p-3">1층</div>
        </div>
    </div>

    <div class="m-5">
        <h3>004. col-디바이스-칸수 (칸) </h3>
        <div class="container">
            <!-- row col-sm-12 -->
            <div class="row">
                <div class="col-sm-12 bg-warning p-3">칸은 12칸</div>
            </div>
            <!-- row > col-sm-6 , col-sm-6 -->
            <div class="row">
                <div class="col-sm-6 bg-success p-3">칸은 12/2  (6)</div>
                <div class="col-sm-6 bg-info    p-3">칸은 12/2  (6)</div>
            </div>
            <!-- Q1. row > col-sm-2 , col-sm-             뒤에 칸수 채우기 -->
            <div class="row">
                <div class="col-sm-2  bg-success p-3">칸은 2   </div>
                <div class="col-sm-10 bg-info    p-3">칸은 10   </div>
            </div>
            <!-- Q2. row > col-sm-5 , col-sm-5 , col-sm-2  뒤에 칸수 채우기 -->
            <div class="row">
                <div class="col-sm-5  bg-success p-3">칸은 5   </div>
                <div class="col-sm-5  bg-info    p-3">칸은 5   </div>
                <div class="col-sm-2  bg-warning p-3">칸은 2   </div>
            </div>
            <!-- Q3. row > col-sm-4 , col-sm-4 , col-sm-4  뒤에 칸수 채우기 -->
            <div class="row">
                <div class="col-sm-4  bg-success p-3">칸은 4   </div>
                <div class="col-sm-4  bg-info    p-3">칸은 4   </div>
                <div class="col-sm-4  bg-warning p-3">칸은 4   </div>
            </div>
            <!-- Q4. row > col-sm-3 , col-sm-3 , col-sm-3 , col-sm-3 뒤에 칸수 채우기 -->
            <div class="row">
                <div class="col-sm-3  bg-success p-3">칸은 3   </div>
                <div class="col-sm-3  bg-info    p-3">칸은 3   </div>
                <div class="col-sm-3  bg-warning p-3">칸은 3   </div>
                <div class="col-sm-3  bg-info    p-3">칸은 3   </div>
            </div>
        </div>
    </div>

</body>
</html>
