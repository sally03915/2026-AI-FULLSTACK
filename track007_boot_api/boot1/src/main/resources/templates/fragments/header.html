<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head lang="ko">
<title>BOOT</title>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">
<script
	src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
	<th:block th:fragment="header">
		<div class="p-5 bg-primary text-white text-center">
			<h1>MBTI Quest Board</h1>
			<p>각종 보드들의 기능익히기 - PAGING + UPLOAD + BOARD</p>
		</div>

		<nav class="navbar navbar-expand-sm bg-dark navbar-dark">
			<div class="container-fluid">
				<ul class="navbar-nav me-auto"> 
					<li class="nav-item">
						<a class="nav-link"  sec:authorize="isAnonymous()"   th:href="@{/board/list}">BOARD</a>
					</li>
				</ul>
				
				<ul class="d-flex navbar-nav">
					<li class="nav-item">
						<a class="nav-link"  sec:authorize="isAnonymous()"   th:href="@{/users/login}">LOGIN</a>
					</li>
					<li class="nav-item">
						<a class="nav-link"  sec:authorize="isAnonymous()"   th:href="@{/users/join}">JOIN</a>
					</li>
					<li class="nav-item"     sec:authorize="isAuthenticated()">
						<form  th:action="@{/users/logout}"   method="post">
							<button  type="submit"  class="nav-link"  >LOGOUT</button>
						</form> 
					</li>
					<li class="nav-item">
						<a class="nav-link"  sec:authorize="isAuthenticated()" th:href="@{/users/mypage}"
										     sec:authentication="principal.username"	></a>
					</li>
				</ul>
			</div>
		</nav>
	</th:block>
</body>
</html>
