<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>카카오 공지 알림 전송</title> 
</head>
<body>
<div layout:fragment="content">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <!-- 카카오 시그니처 스타일 헤더 -->
                <div class="card-header text-dark" style="background-color: #FEE500;">
                    <h3 class="card-title mb-0 fw-bold">💬 카카오 공지 알림 전송 시스템</h3>
                </div>
                <div class="card-body">
                    
                    <!-- [결과 화면] 1. 전송 성공 메시지 -->
                    <div th:if="${status == 'success'}" class="alert alert-success alert-dismissible fade show" role="alert">
                        <strong>🚀 전송 성공!</strong> 총 <span th:text="${friendCount}">0</span>명의 친구에게 공지를 보냈습니다.
                        <hr>
                        <small class="mb-0">카카오 응답값: <code th:text="${rawResult}"></code></small>
                    </div>
                    
                    <!-- [결과 화면] 2. 전송 실패 메시지 -->
                    <div th:if="${status == 'fail'}" class="alert alert-danger" role="alert">
                        <strong>❌ 전송 실패:</strong> <span th:text="${message}">오류가 발생했습니다.</span>
                    </div>

                    <!-- [전송 폼] 컨트롤러의 /kakao/send-bulk 매핑과 연동 (입력창 없음) -->
                    <form th:action="@{/api/kakao/send-bulk}" method="post">
                        
                        <!-- 메시지 미리보기 블록 -->
                        <div class="card bg-white p-3 mb-4 border">
                            <h5 class="fw-bold text-secondary mb-3">📢 발송될 메시지 미리보기</h5>
                            <p class="mb-1 text-danger fw-bold">🚨 [모임 알림]</p>
                            <p class="mb-0 text-dark">오늘 비 소식이 있어 모임 일정이 연기되었습니다. 자세한 일정은 웹사이트를 참고해 주세요.</p>
                        </div>

                        <!-- 가이드 문구 -->
                        <p class="text-muted text-center small mb-3">
                            * 로그인된 카카오 계정의 세션 토큰을 자동으로 감지하여 동의한 친구들에게 단체 메시지를 전송합니다.
                        </p>

                        <!-- 전송 버튼 -->
                        <button type="submit" class="btn btn-warning w-100 fw-bold py-2 text-dark" style="background-color: #FEE500; border: none;">
                            지금 즉시 단체 메시지 발송하기
                        </button>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
