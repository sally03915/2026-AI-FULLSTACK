<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">
<head lang="ko">
<meta charset="UTF-8">
<title>BOOKS API AJAX</title> 
</head>
<body>
<div layout:fragment="content">
    <h3 class="card-header bg-success text-white">비밀번호 유출 검사기</h3> 
    <p class="info-text">입력하신 비밀번호는 안전하게 암호화 처리되어 유출 기록을 조회합니다.</p>
    
    <div class="input-group"> 
        <input type="text" id="passwordInput" placeholder="검사할 비밀번호를 입력하세요">
    </div>
    <button type="button" class="btn" onclick="checkPassword()">검사하기</button>

    <!-- 비동기 결과가 출력될 영역 -->
    <div id="resultArea" class="result"></div>
<!-- 1. CSRF Meta Tags 추가 -->
<meta th:name="_csrf" th:content="${_csrf.token}"/>
<meta th:name="_csrf_header" th:content="${_csrf.headerName}"/>

 <script th:inline="javascript">
 function checkPassword() {
	    const password = document.getElementById("passwordInput").value;
	    const resultArea = document.getElementById("resultArea");

	    if (!password) {
	        alert("비밀번호를 입력해 주세요.");
	        return;
	    }

	    resultArea.style.display = "none";
	    resultArea.className = "result";

	    // 2. 메타 태그에서 CSRF 토큰 및 헤더 이름 가져오기
	    const token = document.querySelector("meta[name='_csrf']").getAttribute("content");
	    const header = document.querySelector("meta[name='_csrf_header']").getAttribute("content");

	    fetch("/api/util/password", {
	        method: "POST",
	        headers: {
	            "Content-Type": "text/plain",
	            [header]: token // 3. 요청 헤더에 CSRF 토큰 동적 주입
	        },
	        body: password
	    })
	    .then(response => response.text())
	    .then(data => {
	        resultArea.style.display = "block";
	        
	        // 1. 앞뒤 공백 제거
	        const responseText = data.trim();

	        // 2. 컨트롤러에서 보낸 에러 문자열이거나 숫자가 아닌 경우 처리
	        if (responseText.startsWith("ERROR") || isNaN(responseText)) {
	            resultArea.classList.add("error");
	            resultArea.innerHTML = `<strong>검사 실패:</strong> ${responseText}`;
	            return;
	        }

	        // 3. 정상적인 숫자 변환
	        const count = parseInt(responseText, 10);
	        
	        if (count === 0) {
	            resultArea.classList.add("safe");
	            resultArea.innerHTML = "<strong>안전합니다!</strong> 해당 비밀번호는 유출된 기록이 없습니다.";
	        } else {
	            resultArea.classList.add("unsafe");
	            resultArea.innerHTML = `<strong>위험!</strong> 이 비밀번호는 약 <b>${count.toLocaleString()}</b>번 유출된 기록이 있습니다. 다른 비밀번호를 사용하는 것을 권장합니다.`;
	        }
	    })
	    .catch(err => {
	        console.error("통신 에러:", err);
	        resultArea.style.display = "block";
	        resultArea.classList.add("error");
	        resultArea.innerHTML = "<strong>통신 실패:</strong> 서버와 연결할 수 없습니다.";
	    });
	}
</script>
</div>
</body>
</html>
